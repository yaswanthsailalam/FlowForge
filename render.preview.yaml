services:
  # Preview backend
  - type: web
    name: flowforge-backend-preview
    runtime: python
    region: singapore
    plan: free
    branch: feature/product-redesign-foundation-617554644579192282
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/ready

    envVars:
      - key: MONGO_URL
        sync: false

      - key: DB_NAME
        value: flowforge_ai_preview

      - key: SECRET_KEY
        generateValue: true

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

      - key: ENABLE_POC_ENDPOINTS
        value: "false"

      - key: BACKEND_CORS_ORIGINS
        sync: false

  # Preview frontend static site
  - type: web
    name: flowforge-frontend-preview
    runtime: static
    branch: feature/product-redesign-foundation-617554644579192282
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: ./build

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
